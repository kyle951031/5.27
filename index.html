<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧鏡頭即時發票對獎系統</title>
  <link rel="stylesheet" href="static/style.css" />
</head>
<body>
  <div class="page-container">
    <header>
      <h1>智慧鏡頭即時發票對獎系統</h1>
      <p>純前端網頁版實作：拍照、OCR 辨識、8 碼發票號碼擷取與自動對獎。</p>
    </header>

    <main>
      <section class="panel">
        <h2>拍照對獎</h2>
        <div class="camera-panel">
          <video id="video" autoplay playsinline></video>
          <canvas id="snapshotCanvas"></canvas>
        </div>
        <div class="button-row">
          <button id="startCamera" type="button">啟用攝影機</button>
          <button id="capturePhoto" type="button">拍照送出</button>
        </div>
      </section>

      <section class="panel">
        <h2>上傳圖片對獎</h2>
        <label class="file-label" for="fileInput">選擇發票圖片</label>
        <input id="fileInput" type="file" accept="image/*" />
      </section>

      <section class="panel result-panel">
        <h2>對獎結果</h2>
        <div class="status-box" id="statusText">準備中，請稍候...</div>
        <div class="info-box">
          <p><strong>偵測到的號碼：</strong><span id="detectedText">尚未辨識</span></p>
          <p><strong>對獎結果：</strong></p>
          <pre id="resultText">請拍照或上傳發票圖片進行辨識。</pre>
        </div>
        <div class="chart-card">
          <canvas id="resultChart"></canvas>
        </div>
      </section>

      <section class="panel prize-panel">
        <h2>目前中獎號碼</h2>
        <div id="prizeList" class="prize-list"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.0.3/dist/tesseract.min.js"></script>
  <script src="static/main.js"></script>
</body>
</html>
